<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Izzy Penston — Caption Editor</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Albert+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #B34D18;
      --green: #2D8A4E;
      --red: #CF222E;
      --bg: #FAF7F2;
      --bg-secondary: #F0EBE3;
      --text-primary: #1E1B18;
      --text-secondary: #6B6560;
      --text-tertiary: #6E6966;
      --border: #E0DBD4;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --orange: #E07A3A;
        --green: #3FB96A;
        --red: #F85149;
        --bg: #141210;
        --bg-secondary: #1E1B18;
        --text-primary: #F2EDE6;
        --text-secondary: #A39E98;
        --text-tertiary: #908B85;
        --border: #2A2520;
      }
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Albert Sans', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .header h1 {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 700;
    }

    .header h1 a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: inherit;
      transition: color 0.2s ease;
    }

    .header h1 a:hover { color: var(--orange); }

    .nav-star {
      width: 14px;
      height: 14px;
      color: var(--orange);
      flex-shrink: 0;
    }

    .nav-star polygon {
      fill: none;
      transition: fill 0.2s ease;
    }

    .header h1 a:hover .nav-star polygon { fill: var(--orange); }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      font-family: 'Albert Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-save {
      background: var(--green);
      color: white;
    }

    .btn-back {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 8px;
      transition: color 0.2s, border-color 0.2s;
    }

    .btn-back:hover {
      color: var(--orange);
      border-color: var(--orange);
    }

    .change-count {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    .intro {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* --- PIN Screen --- */
    .pin-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
    }

    .pin-screen h2 {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .pin-screen p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .pin-input {
      font-family: 'Albert Sans', sans-serif;
      font-size: 24px;
      text-align: center;
      letter-spacing: 0.3em;
      width: 180px;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .pin-input:focus {
      outline: 2px solid var(--orange);
      outline-offset: 2px;
      border-color: var(--orange);
    }

    .pin-error {
      color: var(--red);
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .pin-btn {
      background: var(--orange);
      color: white;
      font-family: 'Albert Sans', sans-serif;
      font-weight: 600;
      font-size: 15px;
      padding: 12px 32px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .photo-row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }

    .photo-row:last-child {
      border-bottom: none;
    }

    .photo-thumb {
      width: 120px;
      min-width: 120px;
      height: 90px;
      object-fit: cover;
      border-radius: 8px;
      background: var(--bg-secondary);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .photo-thumb:hover {
      transform: scale(1.05);
    }

    .photo-thumb.wide {
      width: 160px;
      min-width: 160px;
    }

    .photo-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .photo-file {
      font-size: 12px;
      color: var(--text-tertiary);
      font-family: monospace;
    }

    .caption-input {
      font-family: 'Albert Sans', sans-serif;
      font-size: 15px;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      width: 100%;
      transition: border-color 0.2s;
    }

    .caption-input:focus {
      outline: none;
      border-color: var(--orange);
    }

    .caption-input.changed {
      border-color: var(--green);
      background: color-mix(in srgb, var(--green) 5%, var(--bg-secondary));
    }

    .loading {
      text-align: center;
      color: var(--text-tertiary);
      padding: 60px 0;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
    }

    .toast.show { opacity: 1; }
    .toast.error { background: var(--red); }

    @media (max-width: 600px) {
      .photo-row { flex-direction: column; }
      .photo-thumb, .photo-thumb.wide { width: 100%; min-width: unset; height: 200px; }
      .header { flex-wrap: wrap; gap: 10px; }
    }

    @media (prefers-color-scheme: dark) {
      .btn-save { color: #1E1B18; }
      .pin-btn { color: #1E1B18; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1><a href="/admin/"><svg class="nav-star" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" aria-hidden="true"><polygon points="50,6 61.8,33.8 91.8,36.4 69,56.2 75.9,85.6 50,70 24.1,85.6 31,56.2 8.2,36.4 38.2,33.8" fill="none" stroke="currentColor" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/></svg>Izzy</a> Captions</h1>
    <div class="header-actions">
      <span class="change-count" id="change-count"></span>
      <button class="btn btn-save" id="btn-save" style="display:none">Save Captions</button>
      <a href="/admin/" class="btn-back">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Admin
      </a>
    </div>
  </div>

  <div class="container">
    <!-- PIN Screen -->
    <div id="pin-screen" class="pin-screen">
      <h2>Caption Editor</h2>
      <p>Enter PIN to edit gallery captions.</p>
      <div class="pin-error" id="pin-error">Incorrect PIN. Try again.</div>
      <input type="password" class="pin-input" id="pin-input" maxlength="10" inputmode="numeric" autocomplete="off" placeholder="PIN" aria-label="PIN">
      <br>
      <button class="pin-btn" id="pin-btn" type="button">Enter</button>
    </div>

    <!-- Editor Screen -->
    <div id="editor-screen" style="display:none">
      <p class="intro">Edit captions below. Changed fields turn green. Hit <strong>Save Captions</strong> to publish changes to the site.</p>
      <div id="grid">
        <div class="loading">Loading photos&hellip;</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  (function () {
    var API_BASE = 'https://izzypenston.com/api/admin';
    var pin = localStorage.getItem('admin_pin') || '';
    var manifest = [];
    var originals = {};
    var saving = false;

    var pinScreen = document.getElementById('pin-screen');
    var editorScreen = document.getElementById('editor-screen');
    var pinInput = document.getElementById('pin-input');
    var pinBtn = document.getElementById('pin-btn');
    var pinError = document.getElementById('pin-error');
    var grid = document.getElementById('grid');
    var btnSave = document.getElementById('btn-save');
    var changeCount = document.getElementById('change-count');
    var toast = document.getElementById('toast');

    function showToast(msg, isError) {
      toast.textContent = msg;
      toast.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(function () { toast.className = 'toast'; }, 3000);
    }

    function countChanges() {
      var count = 0;
      for (var i = 0; i < manifest.length; i++) {
        var input = document.getElementById('caption-' + i);
        if (input && input.value !== originals[i]) {
          count++;
          input.classList.add('changed');
        } else if (input) {
          input.classList.remove('changed');
        }
      }
      changeCount.textContent = count > 0 ? count + ' changed' : '';
      btnSave.style.display = count > 0 ? '' : 'none';
      return count;
    }

    function getUpdatedManifest() {
      var updated = JSON.parse(JSON.stringify(manifest));
      for (var i = 0; i < updated.length; i++) {
        var input = document.getElementById('caption-' + i);
        if (input) updated[i].caption = input.value;
      }
      return updated;
    }

    function escAttr(str) {
      return (str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    }

    function renderGrid() {
      var html = '';
      for (var i = 0; i < manifest.length; i++) {
        var m = manifest[i];
        originals[i] = m.caption;
        html += '<div class="photo-row">';
        html += '<img class="photo-thumb' + (m.wide ? ' wide' : '') + '" src="/assets/photos/' + m.file + '" alt="" loading="lazy" onclick="window.open(\'/assets/photos/' + m.file + '\', \'_blank\')">';
        html += '<div class="photo-info">';
        html += '<div class="photo-file">' + m.file + (m.wide ? ' &bull; wide' : '') + '</div>';
        html += '<input class="caption-input" id="caption-' + i + '" type="text" value="' + escAttr(m.caption) + '" placeholder="Add a caption&hellip;">';
        html += '</div></div>';
      }
      grid.innerHTML = html;

      grid.addEventListener('input', function (e) {
        if (e.target.classList.contains('caption-input')) countChanges();
      });
    }

    function loadManifest() {
      grid.innerHTML = '<div class="loading">Loading photos&hellip;</div>';
      fetch('/assets/photos/manifest.json?v=' + Date.now())
        .then(function (r) { return r.json(); })
        .then(function (data) {
          manifest = data;
          renderGrid();
        })
        .catch(function () {
          grid.innerHTML = '<div class="loading">Could not load manifest.json</div>';
        });
    }

    // --- Save to GitHub via Worker ---
    btnSave.addEventListener('click', function () {
      if (saving) return;
      var changes = countChanges();
      if (changes === 0) return;

      saving = true;
      btnSave.disabled = true;
      btnSave.textContent = 'Saving\u2026';

      var updated = getUpdatedManifest();

      fetch(API_BASE + '/captions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Admin-Pin': pin
        },
        body: JSON.stringify({ manifest: updated })
      })
        .then(function (r) {
          if (r.status === 401) {
            localStorage.removeItem('admin_pin');
            pin = '';
            pinScreen.style.display = '';
            editorScreen.style.display = 'none';
            pinError.style.display = 'block';
            pinError.textContent = 'Session expired. Enter PIN again.';
            throw new Error('Unauthorized');
          }
          return r.json();
        })
        .then(function (data) {
          if (data.ok) {
            // Update originals to match saved state
            for (var i = 0; i < manifest.length; i++) {
              var input = document.getElementById('caption-' + i);
              if (input) {
                manifest[i].caption = input.value;
                originals[i] = input.value;
                input.classList.remove('changed');
              }
            }
            countChanges();
            showToast('Captions saved! Changes will be live in a moment.');
          } else {
            showToast(data.error || 'Failed to save. Try again.', true);
          }
        })
        .catch(function (err) {
          if (err.message !== 'Unauthorized') {
            showToast('Failed to save. Try again.', true);
          }
        })
        .finally(function () {
          saving = false;
          btnSave.disabled = false;
          btnSave.textContent = 'Save Captions';
        });
    });

    // --- PIN Entry ---
    function tryPin() {
      var val = pinInput.value.trim();
      if (!val) return;
      pin = val;

      // Verify PIN by hitting a known endpoint
      fetch(API_BASE + '/pending', {
        headers: { 'X-Admin-Pin': pin }
      }).then(function (r) {
        if (r.status === 401) {
          pinError.style.display = 'block';
          pinError.textContent = 'Incorrect PIN. Try again.';
          pin = '';
          return;
        }
        localStorage.setItem('admin_pin', pin);
        pinScreen.style.display = 'none';
        editorScreen.style.display = '';
        pinError.style.display = 'none';
        loadManifest();
      });
    }

    pinBtn.addEventListener('click', tryPin);
    pinInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') tryPin();
    });

    // Auto-start if PIN is saved
    if (pin) {
      pinScreen.style.display = 'none';
      editorScreen.style.display = '';
      loadManifest();
    }
  }());
  </script>
</body>
</html>
